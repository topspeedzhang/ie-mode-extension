<!DOCTYPE html>
<!--
  Icon Generator for IE Mode Extension
  Open this file in a browser, then click each "Download" button
  to save the required PNG icon files into this folder.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate Icons</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
    canvas { border: 1px solid #ccc; background: #fff; image-rendering: pixelated; }
    button { padding: 6px 14px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>IE Mode Extension — Icon Generator</h1>
  <p style="margin-bottom:16px;color:#555">Click each Download button, save the file to this <code>icons/</code> folder.</p>

  <div class="row">
    <canvas id="c16" width="16" height="16" style="width:32px;height:32px"></canvas>
    <button onclick="download('c16','icon16.png')">Download icon16.png</button>
  </div>
  <div class="row">
    <canvas id="c48" width="48" height="48"></canvas>
    <button onclick="download('c48','icon48.png')">Download icon48.png</button>
  </div>
  <div class="row">
    <canvas id="c128" width="128" height="128"></canvas>
    <button onclick="download('c128','icon128.png')">Download icon128.png</button>
  </div>

  <script>
    function drawIcon(canvas) {
      const size = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = size * 0.12; // corner radius

      // Background: Edge blue gradient
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, '#0ea5e9');
      grad.addColorStop(1, '#0078d4');

      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // "IE" text
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      if (size <= 16) {
        ctx.font = `bold ${size * 0.56}px Arial`;
        ctx.fillText('IE', size / 2, size / 2 + size * 0.03);
      } else {
        ctx.font = `bold ${size * 0.46}px Arial`;
        ctx.fillText('IE', size / 2, size / 2 + size * 0.03);
      }
    }

    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    // Draw all icons on load
    ['c16', 'c48', 'c128'].forEach(id => {
      drawIcon(document.getElementById(id));
    });
  </script>
</body>
</html>

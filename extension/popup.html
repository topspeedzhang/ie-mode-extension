<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IE Mode</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #202020;
      background: #fff;
    }

    .container {
      padding: 16px;
    }

    /* ── States ─────────────────────────────── */

    .state {
      display: none;
      align-items: center;
      gap: 10px;
    }

    .state.active {
      display: flex;
    }

    /* Loading */
    #state-loading .icon {
      width: 20px;
      height: 20px;
      border: 2px solid #ddd;
      border-top-color: #0078d4;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Success */
    #state-success .icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #107c10;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    #state-success .icon svg {
      width: 12px;
      height: 12px;
      fill: none;
      stroke: #fff;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Error (shares .error-icon class with state-no-edge) */

    /* No Edge installed */
    #state-no-edge {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    #state-no-edge.active {
      display: flex;
    }

    #state-no-edge .message {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #state-no-edge .install-btn {
      display: block;
      width: 100%;
      padding: 7px 12px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    #state-no-edge .install-btn:hover {
      background: #006cbd;
    }

    .error-icon {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #c50f1f;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      color: #fff;
      font-weight: 700;
      line-height: 1;
    }

    .text-main {
      font-weight: 500;
      line-height: 1.4;
    }

    .text-sub {
      color: #666;
      font-size: 11px;
      margin-top: 2px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Loading -->
    <div id="state-loading" class="state active">
      <div class="icon"></div>
      <div>
        <div class="text-main">Opening in IE mode…</div>
      </div>
    </div>

    <!-- Success -->
    <div id="state-success" class="state">
      <div class="icon">
        <svg viewBox="0 0 12 12">
          <polyline points="1.5,6 4.5,9 10.5,3"/>
        </svg>
      </div>
      <div>
        <div class="text-main">Opened in IE mode</div>
        <div class="text-sub" id="success-detail"></div>
      </div>
    </div>

    <!-- Error -->
    <div id="state-error" class="state">
      <div class="error-icon">!</div>
      <div>
        <div class="text-main" id="error-title">Something went wrong</div>
        <div class="text-sub" id="error-detail"></div>
      </div>
    </div>

    <!-- No Edge installed (Chrome only) -->
    <div id="state-no-edge">
      <div class="message">
        <div class="error-icon">!</div>
        <div>
          <div class="text-main">Microsoft Edge required</div>
          <div class="text-sub">IE mode needs Edge installed on Windows.</div>
        </div>
      </div>
      <a id="install-edge-btn" class="install-btn" href="https://www.microsoft.com/en-us/edge" target="_blank" rel="noopener noreferrer">
        Download Microsoft Edge
      </a>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
